<meta property="og:site_name" content="{{ site.Title }}">
{{ if .IsHome }}
<meta property="og:title" content="{{ site.Title }}">
{{ else }}
<meta property="og:title" content="{{ with .Title }}{{ . }} · {{ end }}{{ site.Title }}">
{{ end }}
<meta property="og:description" content="{{ .Description | default site.Params.description }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:type" content="{{ if eq .Kind "page" }}article{{ else }}website{{ end }}">
{{ with .Params.photo }}
  {{ $rel := printf "img/%s" . }}
  {{ $orig := resources.Get $rel }}
  {{ if $orig }}
    {{ $og := $orig.Resize "1200x q82" }}
    <meta property="og:image" content="{{ $og.Permalink }}">
    <meta property="og:image:width" content="{{ $og.Width }}">
    <meta property="og:image:height" content="{{ $og.Height }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="{{ $og.Permalink }}">
  {{ end }}
{{ else }}
  <meta name="twitter:card" content="summary">
{{ end }}
