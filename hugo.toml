baseURL = "https://smallobservations.net/"
defaultContentLanguage = "en-gb"
locale = "en-gb"
title = "Small Observations"
enableRobotsTXT = true
theme = "notebook"

# Cleaner pagination URLs: /posts/page/2/ instead of /posts/page/2/index.html
pagination.pagerSize = 20

[taxonomies]
  tag = "tags"
  country = "countries"
  city = "cities"
  artist = "artists"
  year = "years"

# Post URLs derive year/month from .Date (the *taken* date).
[permalinks]
  posts = "/:year/:month/:slug/"

# Related-posts similarity engine (drives the "Related" strip on post pages).
# toLower MUST stay false: tags/artists are mixed-case by design (e.g.
# "John Lennon", "Liverpool FC") and index names must match taxonomy names
# exactly. includeNewer=true so relations work both directions in the archive.
[related]
  threshold = 80
  includeNewer = true
  toLower = false
  [[related.indices]]
    name = "artists"
    weight = 90
  [[related.indices]]
    name = "tags"
    weight = 70
  [[related.indices]]
    name = "cities"
    weight = 40

# Output formats: HTML pages everywhere; one RSS feed at /feed.xml.
[outputs]
  home = ["HTML", "RSS", "LLMS"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML"]

# Serve the feed at /feed.xml instead of Hugo's default /index.xml.
[outputFormats.RSS]
  baseName = "feed"

[mediaTypes."text/plain"]
  suffixes = ["txt"]

[outputFormats.LLMS]
  mediaType = "text/plain"
  baseName = "llms"
  isPlainText = true
  notAlternative = true

[services.rss]
  limit = 20

[deployment]
  # HTML pages, the sitemap, and the RSS feed must revalidate on every deploy.
  # CloudFront's invalidation step covers edges; must-revalidate stops browsers
  # from heuristic-caching stale HTML between deploys. (force = true was set
  # once to backfill the cacheControl metadata on existing objects, then removed
  # — see CLAUDE.md's deployment-matcher note for why it shouldn't stay.)
  [[deployment.matchers]]
    pattern = "^sitemap\\.xml$"
    contentType = "application/xml"
    cacheControl = "public, max-age=0, must-revalidate"
  [[deployment.matchers]]
    pattern = "^feed\\.xml$"
    contentType = "application/rss+xml"
    cacheControl = "public, max-age=0, must-revalidate"
  [[deployment.matchers]]
    pattern = "^llms\\.txt$"
    contentType = "text/plain"
    cacheControl = "public, max-age=0, must-revalidate"
  [[deployment.matchers]]
    pattern = "^.+\\.html$"
    cacheControl = "public, max-age=0, must-revalidate"
  [[deployment.matchers]]
    pattern = "^.+\\.(?:jpg|jpeg|png|gif|webp|svg)$"
    cacheControl = "max-age=31536000, no-transform, public"
  [[deployment.matchers]]
    pattern = "^.+\\.(?:woff2|woff)$"
    cacheControl = "max-age=31536000, no-transform, public"

[[deployment.targets]]
  name = "production"
  URL = "s3://smallobservations.net?region=eu-west-2"
  cloudFrontDistributionID = "E25Q9EQNA4D7K1"

# Image processing defaults — high-quality JPEG, lanczos resampling.
[imaging]
  quality = 82
  resampleFilter = "Lanczos"
  hint = "photo"
  anchor = "smart"

# Allow inlining CSS via resources.Get + minify.
[minify]
  minifyOutput = true
  [minify.tdewolff.html]
    keepWhitespace = true   # don't collapse whitespace inside <pre>
    keepComments = true     # preserve safeHTML-wrapped <!-- --> notes left for view-source readers

[params]
  author = "Jonathan"
  description = "A notebook of street art I've enjoyed and photographed since 2005, browsable by city, artist, year, and tag."
  measure = "34rem"
