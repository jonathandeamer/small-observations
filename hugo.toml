baseURL = "https://smallobservations.net/"
locale = "en-us"
defaultContentLanguage = "en"
title = "Small Observations"
enableRobotsTXT = true
theme = "notebook"

# Cleaner pagination URLs: /posts/page/2/ instead of /posts/page/2/index.html
pagination.pagerSize = 20

[taxonomies]
  tag = "tags"
  country = "countries"
  city = "cities"
  artist = "artists"
  year = "years"

# Post URLs derive year/month from .Date (the *taken* date).
[permalinks]
  posts = "/:year/:month/:slug/"

# Output formats: HTML pages everywhere; one RSS feed at /feed.xml.
[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML"]

# Serve the feed at /feed.xml instead of Hugo's default /index.xml.
[outputFormats.RSS]
  baseName = "feed"

[deployment]
  [[deployment.matchers]]
    pattern = "^.+\\.(?:jpg|jpeg|png|gif|webp|svg)$"
    cacheControl = "max-age=31536000, no-transform, public"
    force = true
  [[deployment.matchers]]
    pattern = "^.+\\.(?:woff2|woff)$"
    cacheControl = "max-age=31536000, no-transform, public"
    force = true

[[deployment.targets]]
  name = "production"
  URL = "s3://smallobservations.net?region=eu-west-2"
  cloudFrontDistributionID = "E25Q9EQNA4D7K1"

# Image processing defaults — high-quality JPEG, lanczos resampling.
[imaging]
  quality = 82
  resampleFilter = "Lanczos"
  hint = "photo"
  anchor = "smart"

# Allow inlining CSS via resources.Get + minify.
[minify]
  minifyOutput = true
  [minify.tdewolff.html]
    keepWhitespace = true   # don't collapse whitespace inside <pre>

[params]
  author = "Jonathan"
  description = "A notebook of street art I've enjoyed and photographed since 2005, browsable by city, artist, year, and tag."
  measure = "34rem"
